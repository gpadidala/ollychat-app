# Override compose file — use when you want the LIVE external repos
# instead of the bundled copies.
#
# Use:
#   make up-external
# or directly:
#   docker compose -f docker-compose.yaml -f docker-compose.external.yaml up -d
#
# Expectations:
#   • ../Grafana-Dashbords/ exists (sibling of this repo) and is the
#     authoritative dashboard + provisioning source.
#   • ../Bifrost/ is running its MCP server on the host at :8765
#     (the bundled ollychat-mcp is disabled below).
#
# What this override does vs the default compose:
#   • Grafana mounts ../Grafana-Dashbords as the dashboards source.
#   • Grafana provisioning is read from ../Grafana-Dashbords/provisioning.
#   • The bundled ollychat-mcp service is replaced with a no-op so you
#     can run the external Bifrost on the host at :8765.
#   • Orchestrator's OLLYCHAT_BIFROST_URL points at host.docker.internal.

services:
  grafana:
    volumes:
      # Override both volume mounts to point at the external sibling repo.
      # The default compose already mounts ./dist and ./grafana-index.html
      # — those stay since they live INSIDE this repo.
      - ../Grafana-Dashbords:/var/lib/grafana/dashboards:ro
      - ../Grafana-Dashbords/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../Grafana-Dashbords/provisioning/datasources:/etc/grafana/provisioning/datasources:ro

  # Drop the bundled MCP — you'll run Bifrost on the host instead.
  ollychat-mcp:
    profiles: ["disabled"]

  ollychat-orchestrator:
    environment:
      OLLYCHAT_BIFROST_URL: "http://host.docker.internal:8765"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: !override
      # No longer wait for ollychat-mcp; it's external.
      otel-collector: { condition: service_started }
      ollama:         { condition: service_started }
