target: all

multitenancy_enabled: false

server:
  http_listen_port: 9009

common:
  storage:
    backend: filesystem
    filesystem:
      dir: /data/mimir

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/blocks
  tsdb:
    dir: /data/mimir/tsdb

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/mimir/ruler

limits:
  max_global_series_per_user: 0
  ingestion_rate: 0
  ingestion_burst_size: 0
