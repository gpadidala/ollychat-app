<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6600"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#0d0d12"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5"/><feColorMatrix values="1 0 0 0 1 0 0.4 0 0 0.4 0 0 0 0 0 0 0 0 0.8 0"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1000" height="600" fill="url(#bg)"/>

  <!-- Top nav -->
  <rect x="0" y="0" width="1000" height="48" fill="#0b0e13"/>
  <circle cx="28" cy="24" r="9" fill="#f05a28"/>
  <text x="50" y="30" fill="#ccc" font-size="14" font-weight="600">Grafana</text>
  <text x="120" y="30" fill="#666" font-size="13">/ Dashboards / AKS — Cluster Overview &amp; Health</text>
  <rect x="700" y="15" width="180" height="20" rx="4" fill="#1e1e2e"/>
  <text x="710" y="29" fill="#666" font-size="11">🔍 Search or jump to...</text>
  <text x="890" y="30" fill="#666" font-size="11">⌘K</text>
  <circle cx="960" cy="24" r="12" fill="#2563eb33" stroke="#2563eb"/>
  <text x="960" y="28" fill="#60a5fa" font-size="11" text-anchor="middle" font-weight="700">A</text>

  <!-- Left sidebar -->
  <rect x="0" y="48" width="56" height="552" fill="#0b0e13"/>
  <g fill="#666">
    <text x="28" y="85" font-size="18" text-anchor="middle">🏠</text>
    <text x="28" y="125" font-size="18" text-anchor="middle">📊</text>
    <text x="28" y="165" font-size="18" text-anchor="middle">🔍</text>
    <text x="28" y="205" font-size="18" text-anchor="middle">🔔</text>
    <text x="28" y="245" font-size="18" text-anchor="middle">⚙️</text>
  </g>

  <!-- Dashboard header -->
  <text x="80" y="85" fill="#fff" font-size="20" font-weight="700">AKS — Cluster Overview &amp; Health</text>
  <text x="80" y="108" fill="#888" font-size="12">Azure · Cloud Infrastructure · Last 6 hours · auto-refresh 30s</text>

  <!-- Top KPI row -->
  <g>
    <rect x="80" y="130" width="210" height="90" rx="8" fill="#181b23" stroke="#2a2a3e"/>
    <text x="95" y="152" fill="#888" font-size="11">Cluster Status</text>
    <text x="95" y="185" fill="#22c55e" font-size="28" font-weight="700">Healthy</text>
    <text x="95" y="206" fill="#666" font-size="10">3/3 nodes ready · 0 pending</text>

    <rect x="305" y="130" width="210" height="90" rx="8" fill="#181b23" stroke="#2a2a3e"/>
    <text x="320" y="152" fill="#888" font-size="11">Pods Running</text>
    <text x="320" y="185" fill="#60a5fa" font-size="28" font-weight="700">247</text>
    <text x="320" y="206" fill="#666" font-size="10">+12 in last hour</text>

    <rect x="530" y="130" width="210" height="90" rx="8" fill="#181b23" stroke="#2a2a3e"/>
    <text x="545" y="152" fill="#888" font-size="11">CPU Utilization</text>
    <text x="545" y="185" fill="#f59e0b" font-size="28" font-weight="700">64.2%</text>
    <text x="545" y="206" fill="#666" font-size="10">P95: 78% · trending up</text>

    <rect x="755" y="130" width="210" height="90" rx="8" fill="#181b23" stroke="#2a2a3e"/>
    <text x="770" y="152" fill="#888" font-size="11">Error Rate</text>
    <text x="770" y="185" fill="#ef4444" font-size="28" font-weight="700">0.42%</text>
    <text x="770" y="206" fill="#666" font-size="10">↑ 0.12% vs 1h ago</text>
  </g>

  <!-- Big chart -->
  <rect x="80" y="240" width="560" height="240" rx="8" fill="#181b23" stroke="#2a2a3e"/>
  <text x="95" y="262" fill="#ccc" font-size="12" font-weight="600">CPU / Memory by Pod</text>
  <!-- Grid lines -->
  <g stroke="#1e1e2e" stroke-width="1">
    <line x1="95" y1="290" x2="625" y2="290"/>
    <line x1="95" y1="340" x2="625" y2="340"/>
    <line x1="95" y1="390" x2="625" y2="390"/>
    <line x1="95" y1="440" x2="625" y2="440"/>
  </g>
  <!-- Orange line -->
  <polyline points="95,420 140,410 185,395 230,380 275,360 320,350 365,335 410,345 455,360 500,340 545,320 590,305 625,310" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <!-- Blue line -->
  <polyline points="95,435 140,430 185,420 230,415 275,410 320,400 365,395 410,390 455,395 500,385 545,370 590,365 625,360" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <!-- Area fills -->
  <polygon points="95,420 140,410 185,395 230,380 275,360 320,350 365,335 410,345 455,360 500,340 545,320 590,305 625,310 625,460 95,460" fill="#f59e0b" opacity="0.08"/>
  <!-- Legend -->
  <circle cx="95" cy="468" r="4" fill="#f59e0b"/>
  <text x="105" y="471" fill="#888" font-size="11">CPU cores</text>
  <circle cx="170" cy="468" r="4" fill="#60a5fa"/>
  <text x="180" y="471" fill="#888" font-size="11">Memory GB</text>

  <!-- Right panel -->
  <rect x="655" y="240" width="310" height="115" rx="8" fill="#181b23" stroke="#2a2a3e"/>
  <text x="670" y="262" fill="#ccc" font-size="12" font-weight="600">Top Namespaces</text>
  <text x="670" y="285" fill="#aaa" font-size="11">production</text>
  <rect x="670" y="290" width="280" height="6" rx="3" fill="#1e1e2e"/>
  <rect x="670" y="290" width="220" height="6" rx="3" fill="#22c55e"/>
  <text x="670" y="315" fill="#aaa" font-size="11">staging</text>
  <rect x="670" y="320" width="280" height="6" rx="3" fill="#1e1e2e"/>
  <rect x="670" y="320" width="140" height="6" rx="3" fill="#60a5fa"/>
  <text x="670" y="345" fill="#aaa" font-size="11">monitoring</text>
  <rect x="670" y="350" width="280" height="6" rx="3" fill="#1e1e2e"/>
  <rect x="670" y="350" width="85" height="6" rx="3" fill="#f59e0b"/>

  <!-- Bottom right panel -->
  <rect x="655" y="365" width="310" height="115" rx="8" fill="#181b23" stroke="#2a2a3e"/>
  <text x="670" y="387" fill="#ccc" font-size="12" font-weight="600">Recent Alerts</text>
  <circle cx="680" cy="408" r="3" fill="#ef4444"/>
  <text x="692" y="411" fill="#ccc" font-size="10">HighMemoryUsage · payment-service</text>
  <text x="692" y="423" fill="#666" font-size="9">firing · 12m ago</text>
  <circle cx="680" cy="443" r="3" fill="#f59e0b"/>
  <text x="692" y="446" fill="#ccc" font-size="10">PodRestartLoop · cache-redis-2</text>
  <text x="692" y="458" fill="#666" font-size="9">pending · 28m ago</text>

  <!-- ═══════════════════════════════════════════════════════════
       O11yBot floating bubble — the star of the shot
       ═══════════════════════════════════════════════════════════ -->
  <g filter="url(#glow)">
    <circle cx="930" cy="540" r="32" fill="url(#brand)"/>
  </g>
  <circle cx="930" cy="540" r="32" fill="url(#brand)"/>
  <!-- Bot face -->
  <path d="M 915 533 q 0 -7 7 -7 h 16 q 7 0 7 7 v 10 q 0 7 -7 7 h -16 q -7 0 -7 -7 z" fill="white"/>
  <circle cx="921" cy="537" r="2" fill="#1a1a2e"/>
  <circle cx="932" cy="537" r="2" fill="#1a1a2e"/>
  <path d="M 919 544 q 5 4 10 0" stroke="#1a1a2e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Green online dot -->
  <circle cx="950" cy="518" r="7" fill="#22c55e" stroke="#0d0d12" stroke-width="2"/>

  <!-- Tooltip hint -->
  <g>
    <rect x="785" y="500" width="130" height="28" rx="6" fill="#0d0d12" stroke="#f59e0b" stroke-width="1"/>
    <text x="850" y="518" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="600">Click to chat →</text>
    <path d="M 915 514 l 8 6 l -8 6 z" fill="#f59e0b"/>
  </g>

  <!-- Label -->
  <rect x="50" y="550" width="350" height="36" rx="18" fill="#0d0d12" stroke="#2a2a3e"/>
  <text x="72" y="573" fill="#f59e0b" font-size="13" font-weight="700">🟠 O11yBot</text>
  <text x="155" y="573" fill="#ccc" font-size="12">floats on EVERY Grafana page · draggable</text>
</svg>
